<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Climbers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    // Auto-bust cache on all CSS/JS resources so visitors always get latest
    (function(){var v='?v='+Date.now();document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('link[rel=stylesheet]').forEach(function(l){if(l.href&&!l.href.includes('fonts.googleapis'))l.href=l.href.split('?')[0]+v});document.querySelectorAll('script[src]').forEach(function(s){var n=document.createElement('script');n.src=s.src.split('?')[0]+v;s.parentNode.replaceChild(n,s)})})})();
  </script>
</head>
<body>

  <!-- ===== HERO BANNER ===== -->
  <section class="hero" id="hero">
    <img class="hero-banner-img" id="heroBannerImg" src="" alt="Climbers Banner" style="display:none">
    <p class="hero-subtitle" id="heroSubtitle">A story waiting to be told...</p>
    <div class="scroll-hint">
      <svg viewBox="0 0 24 24"><path d="M12 16l-6-6h12z"/></svg>
    </div>
  </section>

  <!-- ===== NAVIGATION ===== -->
  <nav class="nav" id="mainNav">
    <a href="#chapters-section">Chapters</a>
    <a href="#gallery-section">Gallery</a>
  </nav>

  <!-- ===== CHAPTERS ===== -->
  <section class="section" id="chapters-section">
    <h2 class="section-title">Chapters</h2>
    <div class="chapters-grid" id="chaptersGrid">
      <p class="empty-state">No chapters released yet. Stay tuned!</p>
    </div>
  </section>

  <!-- ===== READER MODAL ===== -->
  <div class="reader-modal" id="readerModal">
    <div class="reader-modal-header">
      <h2 class="reader-modal-title" id="readerTitle"></h2>
      <button class="reader-modal-close" id="readerClose">&times;</button>
    </div>
    <div class="reader-modal-body" id="readerBody"></div>
  </div>

  <!-- ===== GALLERY ===== -->
  <section class="section" id="gallery-section">
    <h2 class="section-title">Characters &amp; World</h2>
    <div class="gallery-grid" id="galleryGrid">
      <p class="empty-state">Gallery coming soon!</p>
    </div>
  </section>

  <!-- ===== LIGHTBOX (fan art) ===== -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img src="" alt="" id="lightboxImg">
    <p class="lightbox-caption" id="lightboxCaption"></p>
  </div>

  <!-- ===== GALLERY EXPAND MODAL ===== -->
  <div class="gallery-expand" id="galleryExpand">
    <button class="gallery-expand-close" id="galleryExpandClose">&times;</button>
    <div class="gallery-expand-inner" id="galleryExpandInner">
      <div class="gallery-expand-img-wrap">
        <img id="galleryExpandImg" src="" alt="">
      </div>
      <div class="gallery-expand-info">
        <h3 class="gallery-expand-name" id="galleryExpandName"></h3>
        <p class="gallery-expand-field" id="galleryExpandField1"></p>
        <p class="gallery-expand-field" id="galleryExpandField2"></p>
        <p class="gallery-expand-field" id="galleryExpandField3"></p>
        <p class="gallery-expand-field" id="galleryExpandField4"></p>
        <p class="gallery-expand-field" id="galleryExpandField5"></p>
      </div>
    </div>
  </div>

  <!-- ===== AMBIENT AUDIO ===== -->
  <audio id="ambientAudio" loop preload="none"></audio>
  <button class="audio-toggle" id="audioToggle" title="Toggle background music" style="display:none">
    <span class="audio-icon-off" id="audioIconOff">&#128263;</span>
    <span class="audio-icon-on" id="audioIconOn" style="display:none">&#128266;</span>
  </button>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>&copy; <span id="footerYear"></span> Climbers. All rights reserved.</p>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
